services:
  db:
    image: postgres:15
    container_name: glass_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glass_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init-db:
    build: .
    container_name: glass_init
    command: python src/csv_to_db.py
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    container_name: devops_lw2-web-1
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    volumes:
      - ./experiments:/app/experiments

volumes:
  pgdata: